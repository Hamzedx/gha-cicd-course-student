# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:

  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["v1", "vv"]


    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ secrets[matrix.python-version] }}

      - name: Check version
        run: python --version

       

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      
      - name: list repos
        # This is the key verification step in the CI workflow.
        run: ls
      - name: python versio
        # This is the key verification step in the CI workflow.
        run: python --version
      - name: get date
        # This is the key verification step in the CI workflow.
        run: date
        